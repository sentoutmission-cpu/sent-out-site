<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENT OUT MISSION | 03.19.26</title>
    <style>
        body {
            background-color: #000;
            color: #d4af37; /* Metallic Gold */
            font-family: 'Garamond', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            width: 100%;
            height: auto;
            opacity: 0.5; /* Makes the swans look deep and mysterious */
            display: block;
        }
        .floating-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            pointer-events: none;
        }
        h1 {
            font-size: clamp(1.5rem, 5vw, 3rem);
            letter-spacing: 15px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 300;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        p {
            font-size: clamp(0.9rem, 3vw, 1.4rem);
            letter-spacing: 6px;
            margin-top: 20px;
            font-style: italic;
            color: #aaa;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: #666;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="sentinel.png" alt="The Sentinel">
        
        <div class="floating-text">
            <h1>SENT OUT MISSION</h1>
            <p>The Architect is at work.</p>
        </div>
    </div>

    <div class="footer">
        FULL REVEAL: 03.19.26 | 08:00 CST<br>
        <strong>Measured by integrity. Built for longevity.</strong>
    </div>

</body>
</html>
