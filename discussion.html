<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sent Out Mission - Official Hub</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #30363d;
            background-color: #161b22;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
        }
        h1 {
            color: #58a6ff;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .mission-text {
            font-style: italic;
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .btn {
            background-color: #238636;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-block;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #2ea043;
        }
        .footer-text {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #484f58;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sent Out Mission</h1>
        <p class="mission-text">"Anchored in Integrity, Sailing Toward Truth."</p>
        
        <p>The gates are open. Join the crew to discuss theology, fluidity, and the future of the mission.</p>
        
        <br>
        
        <a href="https://github.com/sentoutmission-cpu/sent-out-site/discussions" class="btn">
