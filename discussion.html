<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sent Out Mission - Official Hub</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #30363d;
            background-color: #161b22;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
        }
        h1 {
            color: #58a6ff;
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
        }
        .mission-quote {
            font-style: italic;
            color: #8b949e;
            margin-bottom: 2rem;
            font-size: 1rem;
            line-height: 1.5;
        }
        .btn {
            background-color: #238636;
            color: white;
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #2ea043;
        }
        .status-bar {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #30363d;
            font-size: 0.85rem;
            color: #484f58;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sent Out Mission</h1>
        <p class="mission-quote">"Integrity is the anchor. Truth is the wind."</p>
        
        <p>Welcome to the Safe Harbor. Our community forum is now live on GitHub Discussions.</p>
        
        <br>
        
        <a href="https://github.com/sentoutmission-cpu/sent-out-site/discussions" class="btn">
            Enter the Discussion Hub
        </a>

        <div class="status-bar">
            SOLID PROTECTION: ACTIVE | MINTING: REVOKED
        </div>
    </div>

</body>
</html>
